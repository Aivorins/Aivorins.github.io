<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aivorin's ACB</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: Georgia, serif;
      background: #f0ede8;
      color: #2c2825;
      padding: 20px;
    }

    h1 {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
      color: #2c2825;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding-bottom: 10px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    label {
      font-size: 0.82rem;
      color: #7a7570;
    }

    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #6b8f71; }
    input:checked + .slider::before { transform: translateX(18px); }

    .section-title {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: #7a7570;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .whitelist-input {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .whitelist-input input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 8px;
      font-size: 0.78rem;
      background: white;
      color: #2c2825;
      outline: none;
    }
    .whitelist-input input:focus { border-color: #6b8f71; }

    button {
      padding: 6px 12px;
      background: #6b8f71;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #567a5c; }

    .whitelist-list {
      list-style: none;
      max-height: 80px;
      overflow-y: auto;
    }
    .whitelist-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      padding: 4px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      color: #2c2825;
    }
    .whitelist-list li .remove {
      background: none;
      color: #c0392b;
      padding: 0 4px;
      font-size: 0.85rem;
      min-width: auto;
    }
    .whitelist-list li .remove:hover { background: none; color: #922b21; }

    .empty { font-size: 0.75rem; color: #aaa; font-style: italic; }

    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 0.65rem;
      color: #bbb;
      letter-spacing: 0.06em;
    }


    #pwOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(240, 237, 232, 0.97);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      gap: 10px;
    }
    #pwOverlay.visible { display: flex; }

    #pwTitle {
      font-size: 0.9rem;
      font-weight: 400;
      color: #2c2825;
      text-align: center;
      letter-spacing: 0.03em;
      margin-bottom: 2px;
    }
    #pwSubtitle {
      font-size: 0.72rem;
      color: #7a7570;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 4px;
    }
    .pw-field {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 8px;
      font-size: 0.82rem;
      background: white;
      color: #2c2825;
      outline: none;
      font-family: Georgia, serif;
      letter-spacing: 0.1em;
    }
    .pw-field:focus { border-color: #6b8f71; }
    .pw-field.error  { border-color: #c0392b; animation: shake 0.3s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    #pwError {
      font-size: 0.72rem;
      color: #c0392b;
      min-height: 1em;
      text-align: center;
    }
    #pwBtn { width: 100%; padding: 8px; font-size: 0.82rem; }
  </style>
</head>
<body>


  <div id="pwOverlay">
    <div id="pwTitle"></div>
    <div id="pwSubtitle"></div>
    <input type="password" id="pwInput" class="pw-field" placeholder="Password" autocomplete="off" />
    <input type="password" id="pwConfirm" class="pw-field" placeholder="Confirm password" autocomplete="off" />
    <div id="pwError"></div>
    <button id="pwBtn">Confirm</button>
  </div>


  <h1>Aivorin'S ACB</h1>

  <div class="row">
    <label>Protection active</label>
    <label class="toggle">
      <input type="checkbox" id="enabledToggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <div class="section-title">Whitelist</div>
  <div class="whitelist-input">
    <input type="text" id="whitelistInput" placeholder="example.com" />
    <button id="addBtn">Add</button>
  </div>
  <ul class="whitelist-list" id="whitelistList">
    <li class="empty" id="emptyMsg">No whitelisted sites</li>
  </ul>

  <div class="footer">Aivorin'S ACB · v2.0</div>

  <script src="popup.js"></script>
</body>
</html>
